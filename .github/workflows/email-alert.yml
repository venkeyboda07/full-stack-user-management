name: Email Notification

on:
  workflow_call:
    inputs:
      ci_status:
        required: true
        type: string
      infra_status:
        required: true
        type: string
      deploy_status:
        required: true
        type: string

jobs:
  send-email:
    runs-on: ubuntu-latest

    steps:
      - name: Set Final Status
        id: final
        run: |
          if [[ "${{ inputs.ci_status }}" == "success" && \
                "${{ inputs.infra_status }}" == "success" && \
                "${{ inputs.deploy_status }}" == "success" ]]; then
            echo "status=SUCCESS" >> $GITHUB_OUTPUT
          else
            echo "status=FAILED" >> $GITHUB_OUTPUT
          fi

      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}

          subject: |
            🚀 Pipeline ${{ steps.final.outputs.status }} - ${{ github.repository }}

          to: ${{ secrets.EMAIL_IDS }}
          from: ${{ secrets.EMAIL_USERNAME }}

          body: |
            🔔 Pipeline Notification

            Status: ${{ steps.final.outputs.status }}

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Triggered By: ${{ github.actor }}

            Job Results:
            - CI: ${{ inputs.ci_status }}
            - Infra: ${{ inputs.infra_status }}
            - Deployment: ${{ inputs.deploy_status }}

            View Pipeline:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            